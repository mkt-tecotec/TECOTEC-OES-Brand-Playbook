    <circle cx="920" cy="230" r="5" fill="#FF9900"/>
    <circle cx="970" cy="210" r="3.5" fill="#FF9900"/>
    <circle cx="1000" cy="190" r="2.5" fill="#FF9900"/>
    <circle cx="980" cy="250" r="4" fill="#FF9900"/>
    <circle cx="1030" cy="230" r="3" fill="#FF9900"/>
    <circle cx="1060" cy="200" r="4.5" fill="#FF9900"/>
    <circle cx="1050" cy="260" r="2" fill="#FF9900"/>
    <circle cx="910" cy="280" r="3" fill="#FF9900"/>
    <circle cx="950" cy="300" r="4" fill="#FF9900"/>
    <circle cx="1000" cy="280" r="2.5" fill="#FF9900"/>
