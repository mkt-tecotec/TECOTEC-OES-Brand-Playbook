<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C3250"/>
      <stop offset="100%" stop-color="#114466"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.2" fill="rgba(255,153,0,0.12)"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Orange accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#FF9900"/>
  <!-- Left decorative line -->
  <rect x="80" y="160" width="3" height="310" rx="1.5" fill="#FF9900" opacity="0.6"/>
  <!-- Content -->
  <text x="120" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" letter-spacing="4" fill="#FF9900" text-transform="uppercase">TECOTEC GROUP</text>
  <text x="120" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="-1">TECOTEC</text>
  <text x="120" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="300" fill="rgba(255,255,255,0.85)" letter-spacing="1">Quang Điện Tử</text>
  <text x="120" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="2">Optronics Equipment &amp; Solutions</text>
  <!-- Badge -->
