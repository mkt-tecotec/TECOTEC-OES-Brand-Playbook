  <rect x="316" y="460" width="64" height="36" rx="4" fill="rgba(255,255,255,0.12)"/>
  <text x="348" y="484" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">v1.0</text>
  <!-- Right decorative dots cluster -->
  <g opacity="0.15">
    <circle cx="900" cy="200" r="4" fill="#FF9900"/>
